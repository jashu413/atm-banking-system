server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the backend container.
    # In Docker Compose the backend service is reachable at http://backend:8080.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Also proxy Swagger UI and OpenAPI docs
    location ~ ^/(swagger-ui|v3/api-docs) {
        proxy_pass http://backend:8080;
    }

    # SPA fallback: unknown paths are served as index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted assets aggressively; index.html must not be cached.
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
