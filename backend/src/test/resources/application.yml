# Test profile: in-memory H2 so tests run offline without MySQL.
spring:
  datasource:
    url: jdbc:h2:mem:bankingtestdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHktMTIzNDU2Nzg5MA==
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
