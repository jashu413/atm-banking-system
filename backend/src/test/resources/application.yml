# Test profile: in-memory H2 so tests run offline without MySQL.
spring:
  datasource:
    url: jdbc:h2:mem:bankingtestdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false   # H2 uses create-drop; Flyway SQL is MySQL-specific
app:
  seed-demo-data: false
  base-url: http://localhost:5173
  security:
    max-failed-login-attempts: 3
    rate-limit:
      ip-max-attempts: 1000
      ip-window-seconds: 60
      username-max-attempts: 1000
      username-window-seconds: 900
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHktMTIzNDU2Nzg5MA==
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
