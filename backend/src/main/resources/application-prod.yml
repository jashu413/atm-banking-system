# ── Production profile ────────────────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=prod
# EVERY secret MUST be supplied as an environment variable. No insecure defaults.

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate   # Schema must be managed by Flyway/Liquibase in production

app:
  seed-demo-data: false      # NEVER seed demo users in production
  base-url: ${APP_BASE_URL}
  security:
    max-failed-login-attempts: 3
    rate-limit:
      ip-max-attempts: 20
      ip-window-seconds: 60
      username-max-attempts: 5
      username-window-seconds: 900
  jwt:
    secret: ${JWT_SECRET}    # REQUIRED — generate with: openssl rand -base64 64
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}

logging:
  level:
    com.bank: warn
    org.hibernate.SQL: off
    root: warn
