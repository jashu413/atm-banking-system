spring:
  application:
    name: banking-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/banking_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:banking}
    password: ${DB_PASSWORD:banking}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Phase 0 decision: schema is derived from JPA entities via ddl-auto.
      # 'update' is for development only and is NOT production-safe
      # (see docs/migration-plan.md → Risks and assumptions).
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: ${SERVER_PORT:8080}

# Application-specific settings (consumed once the security layer lands in Phase 3).
app:
  # Seeds demo customers on startup (see DataSeeder). Disabled in the test profile.
  seed-demo-data: true
  security:
    # Lock a user account after this many consecutive failed logins (ported console policy).
    max-failed-login-attempts: ${MAX_FAILED_LOGIN_ATTEMPTS:3}
  jwt:
    # Override in real environments via the JWT_SECRET env var. Base64-encoded, >= 256 bits.
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQta2V5LTEyMzQ1Ng==}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}      # 15 minutes
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days

# Swagger / OpenAPI (springdoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    org.hibernate.SQL: debug
