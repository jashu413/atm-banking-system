# Apache Maven Wrapper configuration.
# Uses the "only-script" distribution type so no maven-wrapper.jar is required;
# the mvnw / mvnw.cmd scripts download Maven directly on first run.
wrapperVersion=3.3.2
distributionType=only-script
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.9/apache-maven-3.9.9-bin.zip
